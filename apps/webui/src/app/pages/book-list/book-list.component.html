<h1>Books</h1>

<div style="margin-bottom: 12px;">
	<a routerLink="/books/new">+ New book</a>
</div>

<div *ngIf="loading">Loading…</div>
<div *ngIf="error" style="color:red">{{ error }}</div>

<table *ngIf="!loading && !error" border="1" cellpadding="6">
	<tr>
		<th>Title</th>
		<th>Author</th>
		<th>Year</th>
		<th>Status</th>
		<th>Actions</th>
	</tr>

	<tr *ngFor="let b of items">
		<td><a [routerLink]="['/books', b.id]">{{ b.title }}</a></td>
		<td>{{ b.author }}</td>
		<td>{{ b.year }}</td>
		<td>{{ b.status }}</td>
		<td>
			<a [routerLink]="['/books', b.id]">Edit</a>
			<button type="button" (click)="deleteBook(b)" style="margin-left: 8px;">
				Delete
			</button>
		</td>
	</tr>
</table>

<div style="margin-top:12px;">
	<button type="button" (click)="prev()" [disabled]="page <= 1">Prev</button>
	<span style="margin: 0 8px;">Page {{ page }}</span>
	<button type="button" (click)="next()" [disabled]="page * pageSize >= total">Next</button>
	<span style="margin-left: 8px;">(Total: {{ total }})</span>
</div>
