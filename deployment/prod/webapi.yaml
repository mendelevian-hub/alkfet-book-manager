apiVersion: apps/v1
kind: Deployment
metadata:
  name: alkfet-webapi
  namespace: alkfet
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alkfet-webapi
  template:
    metadata:
      labels:
        app: alkfet-webapi
    spec:
      containers:
        - name: app
          image: ghcr.io/mendelevian-hub/alkfet-book-manager-webapi:latest
          ports:
            - containerPort: 8080
          env:
            - name: DataAccess__BaseUrl
              value: http://alkfet-dataaccess:8080
---
apiVersion: v1
kind: Service
metadata:
  name: alkfet-webapi
  namespace: alkfet
spec:
  type: NodePort
  selector:
    app: alkfet-webapi
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30081