apiVersion: apps/v1
kind: Deployment
metadata:
  name: alkfet-webui
  namespace: alkfet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alkfet-webui
  template:
    metadata:
      labels:
        app: alkfet-webui
    spec:
      containers:
        - name: app
          image: ghcr.io/mendelevian-hub/alkfet-book-manager-webui:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: alkfet-webui
  namespace: alkfet
spec:
  type: NodePort
  selector:
    app: alkfet-webui
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080